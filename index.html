<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFREM STORE - أدوات ديسكورد</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #202225; color: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #2f3136; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); width: 100%; max-width: 440px; text-align: center; }
        h1 { margin-top: 0; margin-bottom: 5px; color: #5865f2; font-size: 26px; font-weight: bold; }
        .subtitle { color: #b9bbbe; font-size: 14px; margin-bottom: 20px; }
        label { display: block; text-align: right; margin: 12px 0 5px 0; font-size: 14px; color: #dcddde; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 6px; border: none; font-size: 15px; }
        input { background: #40444b; color: #fff; border: 1px solid #202225; outline: none; }
        select { background: #40444b; color: #fff; cursor: pointer; outline: none; }
        button { background: #5865f2; color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; }
        button:hover { background: #4752c4; }
        .tool-section { display: none; }
        .active-tool { display: block; }
        .status { margin-top: 15px; padding: 12px; border-radius: 6px; display: none; font-weight: bold; font-size: 14px; }
        .success { background: #3ba55d; color: #fff; display: block; }
        .error { background: #ed4245; color: #fff; display: block; }
        .info { background: #faa81a; color: #fff; display: block; }
        .footer { margin-top: 25px; color: #dcddde; font-size: 13px; text-align: center; line-height: 1.8; }
        .footer a { color: #00aff4; text-decoration: none; font-weight: bold; }
        .footer a:hover { text-decoration: underline; }
        .links-container { margin-top: 8px; display: flex; justify-content: center; gap: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1>SFREM STORE 🛒</h1>
    <div class="subtitle">منصة أدوات ديسكورد المتكاملة</div>

    <label for="toolSelect">اختر الأداة المطلوبة:</label>
    <select id="toolSelect" onchange="switchTool()">
        <option value="hypesquad">أداة تغيير الـ HypeSquad 🏆</option>
        <option value="coming_soon" disabled>قريباً أدوات جديدة... 🚀</option>
    </select>

    <!-- قسم أداة الهايب سكواد -->
    <div id="hypesquadTool" class="tool-section active-tool">
        <label for="token">توكن الحساب (Discord Token):</label>
        <input type="password" id="token" placeholder="أدخل التوكن هنا..." required>

        <label for="house">اختر البيت أو الإجراء:</label>
        <select id="house">
            <option value="1">Bravery 🟣 (شجاعة)</option>
            <option value="2">Brilliance 🔴 (براعة)</option>
            <option value="3">Balance 🟢 (توازن)</option>
            <option value="leave">❌ إزالة/إلغاء الشارة</option>
        </select>

        <button onclick="handleHypeSquad()">تنفيذ الإجراء</button>
    </div>

    <div id="status" class="status"></div>
</div>

<div class="footer">
    جميع الحقوق محفوظة © <b>SFREM STORE</b><br>
    تم برمجة هذا الموقع بواسطة المبرمج علي (Sefirem)<br>
    <b>للتواصل:</b>
    <div class="links-container">
        <a href="https://discord.com/users/a5mi" target="_blank">حسابي الشخصي (a5mi)</a> | 
        <a href="https://discord.gg/sfrem" target="_blank">سيرفر الديسكورد (sfrem)</a>
    </div>
</div>

<script>
function switchTool() {
    const selected = document.getElementById('toolSelect').value;
    const hypesquadTool = document.getElementById('hypesquadTool');
    
    if (selected === 'hypesquad') {
        hypesquadTool.classList.add('active-tool');
    }
}

async function handleHypeSquad() {
    const token = document.getElementById('token').value.trim();
    const house = document.getElementById('house').value;
    const statusDiv = document.getElementById('status');

    if (!token) {
        statusDiv.className = "status error";
        statusDiv.innerText = "الرجاء كتابة التوكن أولاً!";
        return;
    }

    statusDiv.className = "status info";
    statusDiv.innerText = "جاري تنفيذ الطلب...";

    try {
        let response;
        if (house === 'leave') {
            response = await fetch('https://discord.com/api/v9/hypesquad/online', {
                method: 'DELETE',
                headers: {
                    'Authorization': token,
                    'Content-Type': 'application/json'
                }
            });
        } else {
            response = await fetch('https://discord.com/api/v9/hypesquad/online', {
                method: 'POST',
                headers: {
                    'Authorization': token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ house_id: house })
            });
        }

        if (response.ok || response.status === 204) {
            statusDiv.className = "status success";
            statusDiv.innerText = house === 'leave' ? "تم إزالة شارة الـ HypeSquad بنجاح! 🗑️" : "تم تغيير الـ HypeSquad بنجاح! 🎉";
        } else {
            statusDiv.className = "status error";
            statusDiv.innerText = "فشل الإجراء! تأكد من صحة التوكن.";
        }
    } catch (err) {
        statusDiv.className = "status error";
        statusDiv.innerText = "حدث خطأ أثناء الاتصال بسيرفرات ديسكورد.";
    }
}
</script>

</body>
</html>
