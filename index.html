<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFREM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #080510;
            --panel-bg: rgba(18, 12, 32, 0.8);
            --border-color: rgba(186, 104, 200, 0.3);
            --border-hover: rgba(255, 215, 0, 0.6);
            --primary-purple: #9c27b0;
            --accent-gold: #ffd700;
            --text-main: #f3e5f5;
            --text-muted: #b39ddb;
            --shadow-glow: 0 0 30px rgba(156, 39, 176, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.12) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 20px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--text-main), var(--accent-gold), var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .selector-card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-hover);
            border-radius: 20px;
            padding: 25px;
            box-shadow: var(--shadow-glow);
            margin-bottom: 30px;
        }

        .selector-card label {
            display: block;
            font-size: 1.1rem;
            color: var(--accent-gold);
            margin-bottom: 12px;
            font-weight: 700;
        }

        select, input {
            width: 100%;
            background: rgba(8, 5, 16, 0.8);
            border: 1px solid rgba(186, 104, 200, 0.4);
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }

        select:focus, input:focus {
            border-color: var(--accent-gold);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }

        .tool-panel {
            display: none;
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow-glow);
            animation: fadeIn 0.4s ease-in-out;
            margin-bottom: 30px;
            position: relative;
        }

        .tool-panel.active {
            display: block;
        }

        .tool-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-purple), var(--accent-gold));
        }

        .tool-title {
            font-size: 1.5rem;
            color: var(--accent-gold);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-purple), #6a1b9a);
            color: #fff;
            border: 1px solid rgba(255, 215, 0, 0.4);
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3);
        }

        .btn:hover {
            background: linear-gradient(135deg, #7b1fa2, #4a148c);
            border-color: var(--accent-gold);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.4);
        }

        .output-box {
            margin-top: 20px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px dashed rgba(255, 215, 0, 0.4);
            border-radius: 10px;
            padding: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
            max-height: 180px;
            overflow-y: auto;
            word-break: break-all;
            line-height: 1.6;
        }

        .coming-soon-section {
            background: rgba(18, 12, 32, 0.4);
            border: 1px dashed rgba(186, 104, 200, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .coming-soon-section h3 {
            color: var(--text-muted);
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: rgba(156, 39, 176, 0.15);
            border: 1px solid rgba(186, 104, 200, 0.3);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag i {
            color: var(--accent-gold);
            font-size: 0.8rem;
        }

        footer {
            background: rgba(10, 6, 20, 0.95);
            border-top: 1px solid var(--border-color);
            text-align: center;
            padding: 25px 20px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        footer p {
            margin-bottom: 10px;
        }

        footer .dev-name {
            color: var(--accent-gold);
            font-weight: 700;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .social-links a {
            color: var(--text-main);
            background: rgba(156, 39, 176, 0.2);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-links a:hover {
            background: var(--primary-purple);
            border-color: var(--accent-gold);
            color: #fff;
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media(max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>SFREM STORE</h1>
            <p>منصتك الاحترافية لأدوات ديسكورد المتطورة</p>
        </header>

        <div class="selector-card">
            <label for="tool-selector"><i class="fa-solid fa-screwdriver-wrench"></i> اختر الأداة المطلوبة:</label>
            <select id="tool-selector" onchange="switchTool()">
                <option value="">-- اضغط هنا لاختيار الأداة --</option>
                <option value="hypesquad">أداة هايب سكواد</option>
                <option value="generator">أداة توليد اليوزرات</option>
                <option value="checker">أداة فحص توكن</option>
            </select>
        </div>

        <!-- 1. أداة هايب سكواد -->
        <div id="panel-hypesquad" class="tool-panel">
            <div class="tool-title"><i class="fa-solid fa-medal"></i> أداة هايب سكواد</div>
            <div class="input-group">
                <label>توكن الحساب</label>
                <input type="password" id="hs-token" placeholder="أدخل توكن حسابك هنا...">
            </div>
            <div class="input-group">
                <label>اختر الشارة</label>
                <select id="hs-house">
                    <option value="1">Bravery (القوة الشجاعة)</option>
                    <option value="2">Brilliance (الذكاء)</option>
                    <option value="3">Balance (التوازن)</option>
                    <option value="0">إلغاء الشارة تماماً (None)</option>
                </select>
            </div>
            <button class="btn" onclick="runHypeSquad()">تنفيذ تغيير الشارة</button>
            <div id="hs-output" class="output-box" style="display:none;"></div>
        </div>

        <!-- 2. أداة توليد اليوزرات -->
        <div id="panel-generator" class="tool-panel">
            <div class="tool-title"><i class="fa-solid fa-wand-magic-sparkles"></i> أداة توليد اليوزرات</div>
            <div class="input-group">
                <label>العدد المطلوب</label>
                <input type="number" id="gen-count" value="10" min="1" max="50">
            </div>
            <div class="input-group">
                <label>نوع اليوزر</label>
                <select id="gen-type">
                    <option value="alpha">حروف إنجليزية فقط</option>
                    <option value="numeric">أرقام فقط</option>
                    <option value="mixed">حروف وأرقام مختلطة</option>
                </select>
            </div>
            <div class="input-group">
                <label>البداية (اختياري)</label>
                <input type="text" id="gen-prefix" placeholder="مثال: sf_">
            </div>
            <div class="input-group">
                <label>النهاية (اختياري)</label>
                <input type="text" id="gen-suffix" placeholder="مثال: _xx">
            </div>
            <button class="btn" onclick="runGenerator()">توليد اليوزرات الآن</button>
            <div id="gen-output" class="output-box" style="display:none;"></div>
        </div>

        <!-- 3. أداة فحص التوكن -->
        <div id="panel-checker" class="tool-panel">
            <div class="tool-title"><i class="fa-solid fa-shield-halved"></i> أداة فحص توكن</div>
            <div class="input-group">
                <label>أدخل التوكن لفحصه</label>
                <input type="password" id="chk-token" placeholder="ضع التوكن هنا...">
            </div>
            <button class="btn" onclick="runChecker()">فحص التوكن بدقة</button>
            <div id="chk-output" class="output-box" style="display:none;"></div>
        </div>

        <div class="coming-soon-section">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> أدوات يتم إضافتها قريباً</h3>
            <div class="tags-container">
                <div class="tag"><i class="fa-solid fa-circle"></i> أداة نسخ سيرفرات</div>
                <div class="tag"><i class="fa-solid fa-circle"></i> أداة بوستات</div>
                <div class="tag"><i class="fa-solid fa-circle"></i> أداة تغيير معلومات توكن</div>
                <div class="tag"><i class="fa-solid fa-circle"></i> أداة توليد توكنات</div>
            </div>
        </div>
    </div>

    <footer>
        <p>تم برمجة هذا الموقع بواسطة المبرمج علي <span class="dev-name">(sfrem)</span></p>
        <div class="social-links">
            <a href="https://discord.com/users/a5mi" target="_blank"><i class="fa-brands fa-discord"></i> حساب ديسكورد</a>
            <a href="https://discord.gg/sfrem" target="_blank"><i class="fa-solid fa-server"></i> سيرفر ديسكورد</a>
        </div>
    </footer>

    <script>
        function switchTool() {
            const selectedVal = document.getElementById('tool-selector').value;
            const panels = document.querySelectorAll('.tool-panel');
            
            panels.forEach(panel => panel.classList.remove('active'));
            
            if (selectedVal) {
                const activePanel = document.getElementById('panel-' + selectedVal);
                if (activePanel) activePanel.classList.add('active');
            }
        }

        async function runHypeSquad() {
            const token = document.getElementById('hs-token').value.trim();
            const house = document.getElementById('hs-house').value;
            const output = document.getElementById('hs-output');
            
            output.style.display = 'block';
            if (!token) {
                output.innerHTML = '❌ الرجاء إدخال التوكن أولاً!';
                return;
            }

            output.innerHTML = '⏳ جاري إرسال الطلب إلى ديسكورد...';

            try {
                const response = await fetch('https://discord.com/api/v9/hypesquad/online', {
                    method: 'POST',
                    headers: {
                        'Authorization': token,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ house_id: parseInt(house) })
                });

                if (response.ok || response.status === 204) {
                    output.innerHTML = house === "0" ? '✅ تم إزالة الشارة بنجاح تام!' : '✅ تم تغيير شارة الهايب سكواد بنجاح تام!';
                } else {
                    const errData = await response.json().catch(() => ({}));
                    output.innerHTML = `❌ فشل الطلب (رمز الخطأ: ${response.status}). تحقق من صحة التوكن.`;
                }
            } catch (error) {
                output.innerHTML = '❌ حدث خطأ في الاتصال. تأكد من صحة التوكن أو جرب مرة أخرى.';
            }
        }

        function runGenerator() {
            const count = parseInt(document.getElementById('gen-count').value) || 10;
            const type = document.getElementById('gen-type').value;
            const prefix = document.getElementById('gen-prefix').value || '';
            const suffix = document.getElementById('gen-suffix').value || '';
            const output = document.getElementById('gen-output');

            let chars = '';
            if (type === 'alpha') chars = 'abcdefghijklmnopqrstuvwxyz';
            else if (type === 'numeric') chars = '0123456789';
            else chars = 'abcdefghijklmnopqrstuvwxyz0123456789_';

            let results = [];
            for (let i = 0; i < count; i++) {
                let current = '';
                for (let j = 0; j < 6; j++) {
                    current += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                results.push(prefix + current + suffix);
            }

            output.style.display = 'block';
            output.innerHTML = '<b>✨ اليوزرات المולدة بنجاح:</b><br>' + results.join('<br>');
        }

        async function runChecker() {
            const token = document.getElementById('chk-token').value.trim();
            const output = document.getElementById('chk-output');

            output.style.display = 'block';
            if (!token) {
                output.innerHTML = '❌ الرجاء إدخال التوكن المراد فحصه!';
                return;
            }

            output.innerHTML = '⏳ جاري فحص بيانات الحساب...';

            try {
                const response = await fetch('https://discord.com/api/v9/users/@me', {
                    headers: { 'Authorization': token }
                });
                const data = await response.json();

                if (data.id) {
                    output.innerHTML = `✅ <b>التوكن شغال وصالح!</b><br>🆔 المعرف: ${data.id}<br>👤 المستخدم: ${data.username}<br>📧 البريد: ${data.email || 'محمي/غير متاح'}`;
                } else {
                    output.innerHTML = '❌ التوكن غير صالح أو منتهي الصلاحية.';
                }
            } catch (error) {
                output.innerHTML = '❌ فشل الاتصال بالخادم، تحقق من التوكن.';
            }
        }
    </script>
</body>
</html>
