<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFREM STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #080510;
            --panel-bg: rgba(18, 12, 32, 0.7);
            --border-color: rgba(186, 104, 200, 0.2);
            --border-hover: rgba(255, 215, 0, 0.4);
            --primary-purple: #9c27b0;
            --accent-gold: #ffd700;
            --text-main: #f3e5f5;
            --text-muted: #b39ddb;
            --shadow-glow: 0 0 25px rgba(156, 39, 176, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(88, 28, 135, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(212, 175, 55, 0.08) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--text-main), var(--accent-gold), var(--primary-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .card {
            background: var(--panel-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-glow);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, var(--primary-purple), var(--accent-gold));
            opacity: 0.7;
        }

        .card:hover {
            border-color: var(--border-hover);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(156, 39, 176, 0.25);
        }

        .card h3 {
            font-size: 1.4rem;
            color: var(--accent-gold);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h3 i {
            color: var(--primary-purple);
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(8, 5, 16, 0.6);
            border: 1px solid rgba(186, 104, 200, 0.3);
            border-radius: 10px;
            padding: 12px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--accent-gold);
        }

        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--primary-purple), #6a1b9a);
            color: #fff;
            border: 1px solid rgba(255, 215, 0, 0.3);
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(156, 39, 176, 0.3);
        }

        .btn:hover {
            background: linear-gradient(135deg, #7b1fa2, #4a148c);
            border-color: var(--accent-gold);
            box-shadow: 0 6px 20px rgba(255, 215, 0, 0.3);
        }

        .output-box {
            margin-top: 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px dashed rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.85rem;
            color: var(--text-muted);
            max-height: 120px;
            overflow-y: auto;
            word-break: break-all;
        }

        .coming-soon-section {
            background: rgba(18, 12, 32, 0.4);
            border: 1px dashed rgba(186, 104, 200, 0.3);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 40px;
        }

        .coming-soon-section h3 {
            color: var(--text-muted);
            margin-bottom: 15px;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .tag {
            background: rgba(156, 39, 176, 0.15);
            border: 1px solid rgba(186, 104, 200, 0.3);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tag i {
            color: var(--accent-gold);
            font-size: 0.8rem;
        }

        footer {
            background: rgba(10, 6, 20, 0.9);
            border-top: 1px solid var(--border-color);
            text-align: center;
            padding: 25px 20px;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        footer p {
            margin-bottom: 10px;
        }

        footer .dev-name {
            color: var(--accent-gold);
            font-weight: 700;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .social-links a {
            color: var(--text-main);
            background: rgba(156, 39, 176, 0.2);
            border: 1px solid var(--border-color);
            padding: 8px 18px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .social-links a:hover {
            background: var(--primary-purple);
            border-color: var(--accent-gold);
            color: #fff;
            transform: translateY(-2px);
        }

        @media(max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .container { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>SFREM STORE</h1>
            <p>منصتك الاحترافية لأدوات ديسكورد المتطورة</p>
        </header>

        <div class="tools-grid">
            <!-- أداة هايب سكواد -->
            <div class="card">
                <h3><i class="fa-solid fa-medal"></i> أداة هايب سكواد</h3>
                <div class="input-group">
                    <label>توكن الحساب</label>
                    <input type="password" id="hs-token" placeholder="أدخل توكن حسابك هنا...">
                </div>
                <div class="input-group">
                    <label>اختر الشارة</label>
                    <select id="hs-house">
                        <option value="1">Bravery (القوة الشجاعة)</option>
                        <option value="2">Brilliance (الذكاء)</option>
                        <option value="3">Balance (التوازن)</option>
                        <option value="0">إلغاء الشارة تماماً (None)</option>
                    </select>
                </div>
                <button class="btn" onclick="changeHypeSquad()">تغيير / إزالة الشارة</button>
                <div id="hs-output" class="output-box" style="display:none;"></div>
            </div>

            <!-- أداة توليد اليوزرات -->
            <div class="card">
                <h3><i class="fa-solid fa-wand-magic-sparkles"></i> أداة توليد اليوزرات</h3>
                <div class="input-group">
                    <label>العدد المطلوب</label>
                    <input type="number" id="gen-count" value="10" min="1" max="50">
                </div>
                <div class="input-group">
                    <label>نوع اليوزر</label>
                    <select id="gen-type">
                        <option value="alpha">حروف إنجليزية فقط</option>
                        <option value="numeric">أرقام فقط</option>
                        <option value="mixed">حروف وأرقام مختلطة</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>البداية (اختياري)</label>
                    <input type="text" id="gen-prefix" placeholder="مثال: sf_">
                </div>
                <div class="input-group">
                    <label>النهاية (اختياري)</label>
                    <input type="text" id="gen-suffix" placeholder="مثال: _xx">
                </div>
                <button class="btn" onclick="generateUsernames()">توليد اليوزرات</button>
                <div id="gen-output" class="output-box" style="display:none;"></div>
            </div>

            <!-- أداة فحص التوكن -->
            <div class="card" style="grid-column: 1 / -1; max-width: 500px; margin: 0 auto; width: 100%;">
                <h3><i class="fa-solid fa-shield-halved"></i> أداة فحص توكن</h3>
                <div class="input-group">
                    <label>أدخل التوكن لفحصه</label>
                    <input type="password" id="chk-token" placeholder="ضع التوكن هنا...">
                </div>
                <button class="btn" onclick="checkTokenInfo()">فحص المعلومات</button>
                <div id="chk-output" class="output-box" style="display:none;"></div>
            </div>
        </div>

        <!-- قائمة الأدوات القادمة -->
        <div class="coming-soon-section">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> أدوات يتم إضافتها قريباً</h3>
            <div class="tags-container">
                <div class="tag"><i class="fa-solid fa-circle"></i> أداة نسخ سيرفرات</div>
                <div class="tag"><i class="fa-solid fa-circle"></i> أداة بوستات</div>
                <div class="tag"><i class="fa-solid fa-circle"></i> أداة تغيير معلومات توكن</div>
                <div class="tag"><i class="fa-solid fa-circle"></i> أداة توليد توكنات</div>
            </div>
        </div>
    </div>

    <footer>
        <p>تم برمجة هذا الموقع بواسطة المبرمج علي <span class="dev-name">(sfrem)</span></p>
        <div class="social-links">
            <a href="https://discord.com/users/a5mi" target="_blank"><i class="fa-brands fa-discord"></i> حساب ديسكورد</a>
            <a href="https://discord.gg/sfrem" target="_blank"><i class="fa-solid fa-server"></i> سيرفر ديسكورد</a>
        </div>
    </footer>

    <script>
        function changeHypeSquad() {
            const token = document.getElementById('hs-token').value.trim();
            const house = document.getElementById('hs-house').value;
            const output = document.getElementById('hs-output');
            
            output.style.display = 'block';
            if (!token) {
                output.innerHTML = 'الرجاء إدخال التوكن أولاً!';
                return;
            }

            output.innerHTML = 'جاري إرسال الطلب إلى ديسكورد...';
            
            fetch('https://discord.com/api/v9/hypesquad/online', {
                method: 'POST',
                headers: {
                    'Authorization': token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ house_id: parseInt(house) })
            })
            .then(res => {
                if(res.ok) {
                    output.innerHTML = house === "0" ? 'تم إزالة الشارة بنجاح!' : 'تم تغيير الهايب سكواد بنجاح!';
                } else {
                    output.innerHTML = 'فشل الطلب، تحقق من صحة التوكن أو قيود المتصفح.';
                }
            })
            .catch(() => {
                output.innerHTML = 'خطأ بالاتصال (مشكلة أمان المتصفح CORS).';
            });
        }

        function generateUsernames() {
            const count = parseInt(document.getElementById('gen-count').value) || 10;
            const type = document.getElementById('gen-type').value;
            const prefix = document.getElementById('gen-prefix').value || '';
            const suffix = document.getElementById('gen-suffix').value || '';
            const output = document.getElementById('gen-output');

            let chars = '';
            if (type === 'alpha') chars = 'abcdefghijklmnopqrstuvwxyz';
            else if (type === 'numeric') chars = '0123456789';
            else chars = 'abcdefghijklmnopqrstuvwxyz0123456789_';

            let results = [];
            for (let i = 0; i < count; i++) {
                let current = '';
                for (let j = 0; j < 6; j++) {
                    current += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                results.push(prefix + current + suffix);
            }

            output.style.display = 'block';
            output.innerHTML = results.join('<br>');
        }

        function checkTokenInfo() {
            const token = document.getElementById('chk-token').value.trim();
            const output = document.getElementById('chk-output');

            output.style.display = 'block';
            if (!token) {
                output.innerHTML = 'الرجاء إدخال التوكن للفحص!';
                return;
            }

            output.innerHTML = 'جاري الفحص...';

            fetch('https://discord.com/api/v9/users/@me', {
                headers: { 'Authorization': token }
            })
            .then(res => res.json())
            .then(data => {
                if (data.id) {
                    output.innerHTML = `<b>الحساب صالح!</b><br>المعرف: ${data.id}<br>اسم المستخدم: ${data.username}<br>البريد: ${data.email || 'غير متاح'}`;
                } else {
                    output.innerHTML = 'التوكن غير صالح أو منتهي الصلاحية.';
                }
            })
            .catch(() => {
                output.innerHTML = 'فشل الاتصال بسبب قيود ديسكورد الأمنية (CORS).';
            });
        }
    </script>
</body>
</html>
