<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFREM STORE - أدوات ديسكورد</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0712;
            --card-bg: rgba(22, 13, 36, 0.85);
            --gold-primary: #ffd700;
            --gold-secondary: #ffb700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --purple-primary: #8a2be2;
            --purple-hover: #9d4edf;
            --purple-glow: rgba(138, 43, 226, 0.5);
            --text-color: #ffffff;
            --subtext-color: #d1c4e9;
            --input-bg: rgba(10, 5, 18, 0.9);
            --success-color: #00ff87;
            --danger-color: #ff0055;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(138, 43, 226, 0.25) 0%, transparent 45%),
                radial-gradient(circle at 85% 85%, rgba(255, 215, 0, 0.15) 0%, transparent 45%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8), 0 0 20px var(--purple-glow);
            border: 1px solid rgba(255, 215, 0, 0.25);
            width: 100%;
            max-width: 440px;
            text-align: center;
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--purple-primary), var(--gold-primary), var(--purple-primary));
        }

        .brand-header {
            margin-bottom: 28px;
        }

        .brand-title {
            margin: 0;
            font-size: 30px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--gold-primary) 0%, #ffffff 50%, var(--purple-hover) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px var(--gold-glow);
            letter-spacing: 1.5px;
        }

        .subtitle {
            color: var(--subtext-color);
            font-size: 13px;
            margin-top: 8px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--gold-primary);
        }

        input, select {
            width: 100%;
            padding: 13px 16px;
            border-radius: 10px;
            border: 1px solid rgba(138, 43, 226, 0.4);
            background: var(--input-bg);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--gold-primary);
            box-shadow: 0 0 12px var(--gold-glow);
        }

        select {
            cursor: pointer;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ffd700' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: left 12px center;
            background-size: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--purple-primary), #5a189a);
            color: var(--gold-primary);
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 15px var(--purple-glow);
            border: 1px solid rgba(255, 215, 0, 0.3);
            letter-spacing: 0.5px;
        }

        button:hover {
            background: linear-gradient(135deg, var(--purple-hover), var(--purple-primary));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--purple-glow), 0 0 10px var(--gold-glow);
            color: #ffffff;
        }

        button:active {
            transform: translateY(0);
        }

        .status {
            margin-top: 20px;
            padding: 12px 15px;
            border-radius: 10px;
            display: none;
            font-size: 14px;
            font-weight: 700;
            animation: fadeIn 0.3s ease;
        }

        .success { background: rgba(0, 255, 135, 0.1); color: var(--success-color); border: 1px solid var(--success-color); display: block; box-shadow: 0 0 10px rgba(0, 255, 135, 0.2); }
        .error { background: rgba(255, 0, 85, 0.1); color: var(--danger-color); border: 1px solid var(--danger-color); display: block; box-shadow: 0 0 10px rgba(255, 0, 85, 0.2); }
        .info { background: rgba(255, 215, 0, 0.1); color: var(--gold-primary); border: 1px solid var(--gold-primary); display: block; box-shadow: 0 0 10px var(--gold-glow); }

        .footer {
            margin-top: 30px;
            color: var(--subtext-color);
            font-size: 13px;
            text-align: center;
            line-height: 1.8;
        }

        .footer b {
            color: var(--gold-primary);
        }

        .links-container {
            margin-top: 12px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(138, 43, 226, 0.15);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            color: #ffffff;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
        }

        .btn-link:hover {
            background: var(--purple-primary);
            border-color: var(--gold-primary);
            color: var(--gold-primary);
            box-shadow: 0 0 12px var(--purple-glow);
            transform: translateY(-2px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand-header">
        <h1 class="brand-title"><i class="fa-solid fa-crown" style="color: var(--gold-primary);"></i> SFREM STORE</h1>
        <div class="subtitle">منصة أدوات ديسكورد الشاملة والاحترافية</div>
    </div>

    <div class="form-group">
        <label for="toolSelect"><i class="fa-solid fa-toolbox"></i> اختر الأداة المطلوبة:</label>
        <select id="toolSelect">
            <option value="hypesquad">أداة تغيير الـ HypeSquad 🏆</option>
            <option value="coming_soon" disabled>قريباً أدوات جديدة... 🚀</option>
        </select>
    </div>

    <div id="hypesquadTool">
        <div class="form-group">
            <label for="token"><i class="fa-solid fa-key"></i> توكن الحساب (Discord Token):</label>
            <input type="password" id="token" placeholder="ضع التوكن الخاص بك هنا..." required>
        </div>

        <div class="form-group">
            <label for="house"><i class="fa-solid fa-shield-halved"></i> اختر البيت أو الإجراء:</label>
            <select id="house">
                <option value="1">Bravery 🟣 (بيت الشجاعة)</option>
                <option value="2">Brilliance 🔴 (بيت البراعة)</option>
                <option value="3">Balance 🟢 (بيت التوازن)</option>
                <option value="leave">❌ إزالة / إلغاء الشارة نهائياً</option>
            </select>
        </div>

        <button onclick="handleHypeSquad()"><i class="fa-solid fa-bolt"></i> تنفيذ الإجراء الآن</button>
    </div>

    <div id="status" class="status"></div>
</div>

<div class="footer">
    جميع الحقوق محفوظة © <b>SFREM STORE</b><br>
    تم برمجة هذا الموقع بواسطة المبرمج علي (Sefirem)<br>
    <div class="links-container">
        <a class="btn-link" href="https://discord.com/users/a5mi" target="_blank">
            <i class="fa-brands fa-discord" style="color: var(--gold-primary);"></i> حسابي (a5mi)
        </a>
        <a class="btn-link" href="https://discord.gg/sfrem" target="_blank">
            <i class="fa-solid fa-server" style="color: var(--gold-primary);"></i> سيرفرنا (sfrem)
        </a>
    </div>
</div>

<script>
async function handleHypeSquad() {
    const token = document.getElementById('token').value.trim();
    const house = document.getElementById('house').value;
    const statusDiv = document.getElementById('status');

    if (!token) {
        statusDiv.className = "status error";
        statusDiv.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> يرجى إدخال التوكن أولاً!';
        return;
    }

    statusDiv.className = "status info";
    statusDiv.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري تنفيذ الطلب...';

    try {
        let response;
        if (house === 'leave') {
            response = await fetch('https://discord.com/api/v9/hypesquad/online', {
                method: 'DELETE',
                headers: {
                    'Authorization': token,
                    'Content-Type': 'application/json'
                }
            });
        } else {
            response = await fetch('https://discord.com/api/v9/hypesquad/online', {
                method: 'POST',
                headers: {
                    'Authorization': token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ house_id: house })
            });
        }

        if (response.ok || response.status === 204) {
            statusDiv.className = "status success";
            statusDiv.innerHTML = house === 'leave' 
                ? '<i class="fa-solid fa-circle-check"></i> تم إزالة شارة الـ HypeSquad بنجاح!' 
                : '<i class="fa-solid fa-circle-check"></i> تم تغيير الـ HypeSquad بنجاح! 🎉';
        } else {
            statusDiv.className = "status error";
            statusDiv.innerHTML = '<i class="fa-solid fa-circle-xmark"></i> فشل الإجراء! تأكد من صحة التوكن.';
        }
    } catch (err) {
        statusDiv.className = "status error";
        statusDiv.innerHTML = '<i class="fa-solid fa-wifi"></i> حدث خطأ أثناء الاتصال بسيرفرات ديسكورد.';
    }
}
</script>

</body>
</html>
